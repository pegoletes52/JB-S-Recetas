<!DOCTYPE html>
<html lang="es" data-jb-theme="mint">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JB's Recetas</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00C9A7">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JB's Recetas">
<style>
:root[data-jb-theme="mint"]{--jb-bg:#EAF6F4;--jb-surface:#FFFFFF;--jb-accent-1:#00C9A7;--jb-accent-2:#00E0A0;--jb-text:#0F2A26;}
:root[data-jb-theme="ocean"]{--jb-bg:#E8F4FB;--jb-surface:#FFFFFF;--jb-accent-1:#0EA5E9;--jb-accent-2:#06B6D4;--jb-text:#0C2733;}
:root[data-jb-theme="sage"]{--jb-bg:#EFF5EC;--jb-surface:#FFFFFF;--jb-accent-1:#6BA368;--jb-accent-2:#A3D9A5;--jb-text:#1E2E1B;}
:root[data-jb-theme="teal"]{--jb-bg:#E6F7F6;--jb-surface:#FFFFFF;--jb-accent-1:#009688;--jb-accent-2:#26C6DA;--jb-text:#0B2C2A;}
:root[data-jb-theme="coral"]{--jb-bg:#FFF1EC;--jb-surface:#FFFFFF;--jb-accent-1:#FF6B5B;--jb-accent-2:#FF9472;--jb-text:#3A1712;}
:root[data-jb-theme="lavanda"]{--jb-bg:#F3EFFB;--jb-surface:#FFFFFF;--jb-accent-1:#8B5CF6;--jb-accent-2:#C084FC;--jb-text:#241A3D;}
:root[data-jb-theme="noche"]{--jb-bg:#121826;--jb-surface:#1E2536;--jb-accent-1:#00E0A0;--jb-accent-2:#26C6DA;--jb-text:#EDEFF5;}

*{box-sizing:border-box;}
body{background:var(--jb-bg);color:var(--jb-text);font-size:17px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;margin:0;transition:background 300ms ease;padding-bottom:40px;}
.jb-title-gradient{background:linear-gradient(135deg,var(--jb-accent-1),var(--jb-accent-2));-webkit-background-clip:text;background-clip:text;color:transparent;}
.jb-card{background:var(--jb-surface);border-radius:16px;border:1px solid color-mix(in srgb, var(--jb-accent-1) 30%, transparent);box-shadow:0 8px 24px rgba(0,0,0,0.08);animation:jbFadeSlideIn 400ms ease-out;}
.jb-btn{background:linear-gradient(135deg,var(--jb-accent-1),var(--jb-accent-2));border-radius:12px;color:white;border:none;padding:10px 18px;font-size:15px;font-weight:600;cursor:pointer;transition:transform 200ms ease-out, box-shadow 200ms ease-out;}
.jb-btn:hover{transform:scale(1.03);box-shadow:0 0 20px color-mix(in srgb, var(--jb-accent-1) 50%, transparent);}
.jb-btn:active{animation:jbPulse 350ms ease;}
.jb-btn-ghost{background:transparent;border:1.5px solid color-mix(in srgb, var(--jb-accent-1) 50%, transparent);color:var(--jb-text);border-radius:12px;padding:8px 14px;font-size:14px;cursor:pointer;transition:transform 200ms ease-out;}
.jb-btn-ghost:hover{transform:scale(1.03);border-color:var(--jb-accent-1);}
.jb-input{background:var(--jb-surface);border:1.5px solid color-mix(in srgb, var(--jb-accent-1) 25%, transparent);border-radius:12px;padding:10px 14px;font-size:16px;color:var(--jb-text);width:100%;}
.jb-input:focus{outline:none;border-color:var(--jb-accent-1);box-shadow:0 0 12px color-mix(in srgb, var(--jb-accent-1) 40%, transparent);}
@keyframes jbFadeSlideIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes jbPulse{0%{transform:scale(1);}50%{transform:scale(0.97);}100%{transform:scale(1);}}
@media (prefers-reduced-motion:reduce){.jb-card,.jb-btn,.jb-btn:active,.recipe-card,.tab-panel.active{animation:none;transition:none;}}

header{position:sticky;top:0;z-index:50;background:color-mix(in srgb, var(--jb-bg) 88%, transparent);backdrop-filter:blur(10px);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid color-mix(in srgb, var(--jb-accent-1) 20%, transparent);}
.logo-wrap{display:flex;align-items:center;gap:10px;}
.logo-wrap .emoji{font-size:24px;}
.logo-wrap h1{font-size:19px;margin:0;font-weight:800;}
.header-controls{display:flex;align-items:center;gap:6px;}
.theme-dots{display:flex;gap:6px;align-items:center;}
.theme-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 150ms ease;}
.theme-dot:hover{transform:scale(1.2);}
.theme-dot.active{border-color:var(--jb-text);}

main{max-width:760px;margin:0 auto;padding:16px;}
.tabs{display:flex;gap:7px;margin-bottom:18px;}
.tab-btn{flex:1;text-align:center;padding:10px 14px;border-radius:12px;border:1.5px solid color-mix(in srgb, var(--jb-accent-1) 25%, transparent);background:var(--jb-surface);color:var(--jb-text);font-size:14.5px;font-weight:600;cursor:pointer;}
.tab-btn.active{background:linear-gradient(135deg,var(--jb-accent-1),var(--jb-accent-2));color:white;border-color:transparent;}
.tab-panel{display:none;}
.tab-panel.active{display:block;animation:jbFadeSlideIn 280ms ease-out;}

.search-box-wrap{display:flex;gap:8px;margin-bottom:14px;}
.chip-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:20px;}
.chip{padding:7px 13px;border-radius:20px;font-size:13.5px;font-weight:600;border:1.5px solid color-mix(in srgb, var(--jb-accent-1) 30%, transparent);background:var(--jb-surface);cursor:pointer;color:var(--jb-text);}
.chip:hover{transform:scale(1.03);}

.recipe-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.recipe-card{position:relative;border-radius:14px;overflow:hidden;cursor:pointer;aspect-ratio:1/1;background:var(--jb-surface);box-shadow:0 8px 20px rgba(0,0,0,0.14);transition:transform 200ms ease;animation:jbFadeSlideIn 400ms ease-out;}
.recipe-card:hover{transform:scale(1.03);}
.recipe-card img{width:100%;height:100%;object-fit:cover;display:block;}
.recipe-overlay{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(0deg, rgba(0,0,0,0.88), rgba(0,0,0,0.25) 65%, rgba(0,0,0,0));padding:24px 9px 8px;}
.recipe-title{color:#fff;font-size:14.5px;font-weight:700;line-height:1.25;margin:0 0 4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.recipe-badge{position:absolute;top:7px;left:7px;font-size:12px;font-weight:800;padding:3px 8px;border-radius:9px;background:rgba(0,0,0,0.55);color:#fff;}
.recipe-badge.quick{background:linear-gradient(135deg,var(--jb-accent-1),var(--jb-accent-2));}
.recipe-save-mark{position:absolute;top:7px;right:7px;font-size:16px;}

.empty-state{text-align:center;padding:50px 20px;opacity:0.75;}
.empty-state .emoji{font-size:42px;display:block;margin-bottom:10px;}
.loader{text-align:center;padding:30px;opacity:0.6;font-size:14px;}

.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:110;display:none;align-items:flex-end;justify-content:center;}
.detail-overlay.active{display:flex;}
.detail-box{background:var(--jb-surface);border-radius:20px 20px 0 0;max-width:520px;width:100%;max-height:94vh;overflow-y:auto;position:relative;animation:jbFadeSlideIn 350ms ease-out;}
.detail-img-wrap{position:relative;width:100%;aspect-ratio:16/10;background:color-mix(in srgb, var(--jb-accent-1) 20%, transparent);}
.detail-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.detail-close{position:absolute;top:14px;right:14px;background:rgba(0,0,0,0.6);color:#fff;border:1.5px solid rgba(255,255,255,0.25);width:36px;height:36px;border-radius:50%;font-size:17px;cursor:pointer;z-index:3;}
.detail-body{padding:18px 20px 26px;}
.detail-title{font-size:20px;font-weight:800;margin:0 0 8px;line-height:1.2;}
.section-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:0.03em;opacity:0.6;margin:18px 0 8px;}
.ing-row{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid color-mix(in srgb, var(--jb-accent-1) 15%, transparent);font-size:15px;}
.ing-row:last-child{border-bottom:none;}
.instructions{font-size:15px;line-height:1.6;white-space:pre-line;}
.warn-note{font-size:13px;opacity:0.6;margin-top:14px;}
.detail-actions{display:flex;gap:8px;margin-top:20px;}
.app-footer{text-align:center;font-size:13.5px;opacity:0.45;margin-top:30px;padding:0 20px;line-height:1.5;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--jb-text);color:var(--jb-bg);padding:10px 18px;border-radius:20px;font-size:14px;z-index:200;opacity:0;transition:opacity 250ms ease;pointer-events:none;}
.toast.show{opacity:0.92;}
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <span class="emoji">🍳</span>
    <h1 class="jb-title-gradient">JB's Recetas</h1>
  </div>
  <div class="header-controls">
    <div class="theme-dots" id="themeDots"></div>
  </div>
</header>

<main>
  <div class="tabs">
    <button class="tab-btn active" data-tab="buscar">🔍 Buscar</button>
    <button class="tab-btn" data-tab="recetario">📖 Mi Recetario</button>
  </div>

  <div class="tab-panel active" id="panel-buscar">
    <div class="search-box-wrap">
      <input type="text" class="jb-input" id="searchInput" placeholder="¿Qué ingrediente tienes? (ej. pollo)">
      <button class="jb-btn" id="searchBtn">Buscar</button>
    </div>
    <div class="chip-row" id="chipRow"></div>
    <div id="searchResults"></div>
  </div>

  <div class="tab-panel" id="panel-recetario">
    <div id="savedResults"></div>
  </div>

  <div class="app-footer">Recetas cortesía de TheMealDB (gratis, sin necesidad de clave). Traducción automática vía MyMemory — puede contener alguna imprecisión.</div>
</main>

<div class="detail-overlay" id="detailOverlay">
  <div class="detail-box">
    <button class="detail-close" id="detailClose">✕</button>
    <div class="detail-img-wrap"><img id="detailImg" src="" alt=""></div>
    <div class="detail-body">
      <span class="recipe-badge" id="detailBadge" style="position:static;display:inline-block;margin-bottom:8px;"></span>
      <h2 class="detail-title" id="detailTitle"></h2>
      <div class="section-title">Ingredientes</div>
      <div id="detailIngredients"></div>
      <div class="section-title">Preparación</div>
      <div class="instructions" id="detailInstructions"></div>
      <div class="warn-note" id="detailWarn" style="display:none;">⚠️ La traducción no está disponible ahora mismo; se muestra en inglés.</div>
      <div class="detail-actions">
        <button class="jb-btn" id="saveToggleBtn"></button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ---------- ESTADO ----------
const THEMES=[{id:'mint',c:'#00C9A7'},{id:'ocean',c:'#0EA5E9'},{id:'sage',c:'#6BA368'},{id:'teal',c:'#009688'},{id:'coral',c:'#FF6B5B'},{id:'lavanda',c:'#8B5CF6'}];
const CHIPS=[{es:'Pollo',en:'chicken'},{es:'Carne de res',en:'beef'},{es:'Cerdo',en:'pork'},{es:'Atún',en:'tuna'},{es:'Huevo',en:'egg'},{es:'Arroz',en:'rice'},{es:'Pasta',en:'pasta'},{es:'Queso',en:'cheese'},{es:'Patata',en:'potato'},{es:'Champiñones',en:'mushrooms'}];

function loadState(){
  try{
    const raw=localStorage.getItem('jbRecetasState');
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {theme:'mint', saved:[]};
}
function saveState(){ localStorage.setItem('jbRecetasState', JSON.stringify(state)); }
let state=loadState();
let currentDetail=null; // recipe object actualmente abierto en el modal

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

// ---------- TEMA ----------
function initThemeDots(){
  const wrap=document.getElementById('themeDots');
  wrap.innerHTML='';
  THEMES.forEach(t=>{
    const d=document.createElement('div');
    d.className='theme-dot'+(state.theme===t.id?' active':'');
    d.style.background=t.c; d.title=t.id;
    d.onclick=()=>{ state.theme=t.id; saveState(); initThemeDots(); applyTheme(); };
    wrap.appendChild(d);
  });
  const moon=document.createElement('div');
  moon.className='theme-dot'+(state.theme==='noche'?' active':'');
  moon.style.background='#121826'; moon.style.display='flex';moon.style.alignItems='center';moon.style.justifyContent='center';moon.style.fontSize='12px';
  moon.textContent='🌙'; moon.title='noche';
  moon.onclick=()=>{ state.theme='noche'; saveState(); initThemeDots(); applyTheme(); };
  wrap.appendChild(moon);
}
function applyTheme(){ document.documentElement.setAttribute('data-jb-theme', state.theme||'mint'); }

// ---------- TABS ----------
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
    if(btn.dataset.tab==='recetario') renderSaved();
  };
});

// ---------- TRADUCCIÓN (MyMemory, gratis, sin clave) ----------
const DELIM=' ### ';
async function translateRaw(text){
  const url=`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|es`;
  const res=await fetch(url);
  const data=await res.json();
  const out=data && data.responseData && data.responseData.translatedText;
  if(!out || /MYMEMORY WARNING/i.test(out)) throw new Error('translate-limit');
  return out;
}
function chunkText(text, maxLen){
  const parts=text.split(/(?<=[.!?])\s+/);
  const chunks=[]; let cur='';
  parts.forEach(p=>{
    if((cur+' '+p).trim().length>maxLen){ if(cur) chunks.push(cur.trim()); cur=p; }
    else cur=(cur+' '+p).trim();
  });
  if(cur) chunks.push(cur.trim());
  return chunks.length?chunks:[text];
}
async function translateLong(text){
  const chunks=chunkText(text, 450);
  const out=[];
  for(const c of chunks){ out.push(await translateRaw(c)); }
  return out.join(' ');
}
async function translateBatch(items){
  // Une varios textos cortos en una sola llamada usando un separador, para gastar menos peticiones
  const joined=items.join(DELIM);
  if(joined.length<=450){
    const translated=await translateRaw(joined);
    const split=translated.split('###').map(s=>s.replace(/^\s+|\s+$/g,''));
    if(split.length===items.length) return split;
  }
  // Fallback: traducir uno a uno si la unión falla o es muy larga
  const out=[];
  for(const it of items){ out.push(await translateRaw(it)); }
  return out;
}

// ---------- CHIPS ----------
function initChips(){
  const wrap=document.getElementById('chipRow');
  wrap.innerHTML='';
  CHIPS.forEach(c=>{
    const el=document.createElement('div');
    el.className='chip jb-card'; el.style.animation='none';
    el.textContent=c.es;
    el.onclick=()=>{ document.getElementById('searchInput').value=c.es; searchByIngredient(c.en); };
    wrap.appendChild(el);
  });
}

// ---------- BÚSQUEDA ----------
document.getElementById('searchBtn').onclick=()=>doSearch();
document.getElementById('searchInput').addEventListener('keydown', e=>{ if(e.key==='Enter') doSearch(); });

async function doSearch(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q) return;
  const known=CHIPS.find(c=>c.es.toLowerCase()===q.toLowerCase());
  let ingredientEn=known?known.en:q;
  if(!known){
    try{ ingredientEn=await translateEsToEn(q); }catch(e){ /* si falla, probamos tal cual escrito */ }
  }
  searchByIngredient(ingredientEn);
}
async function translateEsToEn(text){
  const url=`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=es|en`;
  const res=await fetch(url);
  const data=await res.json();
  const out=data && data.responseData && data.responseData.translatedText;
  if(!out) throw new Error('no-translation');
  return out;
}

async function searchByIngredient(ingredientEn){
  const resultsEl=document.getElementById('searchResults');
  resultsEl.innerHTML='<div class="loader">Buscando recetas...</div>';
  try{
    const param=ingredientEn.trim().replace(/\s+/g,'_');
    const res=await fetch(`https://www.themealdb.com/api/json/v1/1/filter.php?i=${encodeURIComponent(param)}`);
    const data=await res.json();
    const meals=(data.meals||[]).slice(0,12);
    if(meals.length===0){
      resultsEl.innerHTML='<div class="empty-state"><span class="emoji">🤷</span>No he encontrado recetas con ese ingrediente. Prueba con otro.</div>';
      return;
    }
    let titlesEs;
    try{ titlesEs=await translateBatch(meals.map(m=>m.strMeal)); }
    catch(e){ titlesEs=meals.map(m=>m.strMeal); }
    resultsEl.innerHTML='';
    const grid=document.createElement('div'); grid.className='recipe-grid';
    meals.forEach((m,i)=>{
      const isSaved=state.saved.some(s=>s.idMeal===m.idMeal);
      const card=document.createElement('div'); card.className='recipe-card';
      card.innerHTML=`<img src="${m.strMealThumb}/preview" alt="">
        <div class="recipe-overlay"><div class="recipe-title">${titlesEs[i]||m.strMeal}</div></div>
        ${isSaved?'<span class="recipe-save-mark">⭐</span>':''}`;
      card.onclick=()=>openDetail(m.idMeal, titlesEs[i]||m.strMeal);
      grid.appendChild(card);
    });
    resultsEl.appendChild(grid);
  }catch(e){
    resultsEl.innerHTML='<div class="empty-state"><span class="emoji">⚠️</span>No se pudo conectar. Revisa tu internet e inténtalo de nuevo.</div>';
  }
}

// ---------- DETALLE DE RECETA ----------
async function openDetail(idMeal, titleEsGuess){
  document.getElementById('detailOverlay').classList.add('active');
  document.getElementById('detailTitle').textContent='Cargando...';
  document.getElementById('detailIngredients').innerHTML='';
  document.getElementById('detailInstructions').textContent='';
  document.getElementById('detailWarn').style.display='none';
  try{
    const already=state.saved.find(s=>s.idMeal===idMeal);
    if(already){ currentDetail=already; renderDetail(); return; }

    const res=await fetch(`https://www.themealdb.com/api/json/v1/1/lookup.php?i=${idMeal}`);
    const data=await res.json();
    const meal=data.meals[0];
    const lines=[];
    for(let i=1;i<=20;i++){
      const ing=meal['strIngredient'+i], mea=meal['strMeasure'+i];
      if(ing && ing.trim()) lines.push(((mea&&mea.trim())?mea.trim()+' ':'')+ing.trim());
    }
    let ingEs, titleEs, instrEs, warn=false;
    try{
      const combo=await translateBatch([meal.strMeal, ...lines]);
      titleEs=combo[0]; ingEs=combo.slice(1);
    }catch(e){ titleEs=meal.strMeal; ingEs=lines; warn=true; }
    try{ instrEs=await translateLong(meal.strInstructions); }
    catch(e){ instrEs=meal.strInstructions; warn=true; }

    const stepsCount=meal.strInstructions.split(/\r?\n+/).filter(s=>s.trim()).length || meal.strInstructions.split(/\.\s+/).filter(s=>s.trim()).length;
    const isQuick = lines.length<=6 && stepsCount<=5;

    currentDetail={
      idMeal, titleEs, img:meal.strMealThumb+'/preview',
      ingredients:ingEs, instructions:instrEs, quick:isQuick, warn
    };
    renderDetail();
  }catch(e){
    document.getElementById('detailTitle').textContent='No se pudo cargar';
    document.getElementById('detailInstructions').textContent='Revisa tu conexión a internet e inténtalo de nuevo.';
  }
}
function renderDetail(){
  const d=currentDetail;
  document.getElementById('detailImg').src=d.img;
  document.getElementById('detailTitle').textContent=d.titleEs;
  const badge=document.getElementById('detailBadge');
  badge.textContent=d.quick?'⚡ Rápida':'🕐 Elaborada';
  badge.className='recipe-badge'+(d.quick?' quick':'');
  document.getElementById('detailIngredients').innerHTML=d.ingredients.map(i=>`<div class="ing-row"><span>${i}</span></div>`).join('');
  document.getElementById('detailInstructions').textContent=d.instructions;
  document.getElementById('detailWarn').style.display=d.warn?'block':'none';
  const isSaved=state.saved.some(s=>s.idMeal===d.idMeal);
  const btn=document.getElementById('saveToggleBtn');
  btn.textContent=isSaved?'🗑️ Quitar de mi recetario':'⭐ Guardar en mi recetario';
  btn.onclick=()=>{
    if(isSaved){ state.saved=state.saved.filter(s=>s.idMeal!==d.idMeal); showToast('Receta eliminada'); }
    else{ state.saved.push(d); showToast('Receta guardada'); }
    saveState(); renderDetail();
  };
}
document.getElementById('detailClose').onclick=()=>{ document.getElementById('detailOverlay').classList.remove('active'); };

// ---------- MI RECETARIO ----------
function renderSaved(){
  const el=document.getElementById('savedResults');
  if(state.saved.length===0){
    el.innerHTML='<div class="empty-state"><span class="emoji">📖</span>Aún no has guardado recetas. Busca alguna y pulsa ⭐ para guardarla aquí (funciona sin internet una vez guardada).</div>';
    return;
  }
  const grid=document.createElement('div'); grid.className='recipe-grid';
  state.saved.forEach(r=>{
    const card=document.createElement('div'); card.className='recipe-card';
    card.innerHTML=`<img src="${r.img}" alt="">
      <div class="recipe-overlay"><div class="recipe-title">${r.titleEs}</div></div>
      <span class="recipe-badge${r.quick?' quick':''}">${r.quick?'⚡':'🕐'}</span>`;
    card.onclick=()=>{ document.getElementById('detailOverlay').classList.add('active'); currentDetail=r; renderDetail(); };
    grid.appendChild(card);
  });
  el.innerHTML=''; el.appendChild(grid);
}

// ---------- INICIO ----------
initThemeDots(); applyTheme(); initChips();

// ---------- PWA: registrar service worker ----------
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
